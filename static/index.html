<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local MIND</title>
  
  <link
    rel="icon"
    href="./images/brain-root-light.png"
    media="(prefers-color-scheme: light)"
  >

  <link
    rel="icon"
    href="./images/brain-root-dark.png"
    media="(prefers-color-scheme: dark)"
  >

  <script>
    const loggedInUser = JSON.parse(
      localStorage.getItem("current_user")
    );

    if (!loggedInUser || !loggedInUser.user_id) {
      window.location.href = "./login.html";
    }
  </script>

  <script>
    const savedTheme =
      localStorage.getItem("local_mind_theme");

    const preferredTheme =
      window.matchMedia("(prefers-color-scheme: light)").matches
        ? "light"
        : "dark";

    document.documentElement.dataset.theme =
      savedTheme || preferredTheme;
  </script>

  <style>

    :root {
      color-scheme: dark;

      --page-background: var(--page-background);
      --sidebar-background: var(--sidebar-background);
      --panel-background: var(--panel-background);
      --panel-hover: #3a3a3a;
      --panel-active: #343434;

      --primary-text: #ececec;
      --secondary-text: #cfcfcf;
      --muted-text: #aaaaaa;

      --border-color: #444444;
      --subtle-border: #2f2f2f;

      --input-background: var(--panel-background);
      --code-background: #111111;

      --button-background: #ffffff;
      --button-text: #000000;

      --accent-color: #19a37f;
      --drag-background: var(--drag-background);
    }

    :root[data-theme="light"] {
      color-scheme: light;

      --page-background: #f7f7f8;
      --sidebar-background: #ececf1;
      --panel-background: #ffffff;
      --panel-hover: #e3e3e8;
      --panel-active: #d9d9df;

      --primary-text: #202123;
      --secondary-text: #444654;
      --muted-text: #6e6e80;

      --border-color: #c5c5d2;
      --subtle-border: #d9d9e3;

      --input-background: #ffffff;
      --code-background: #eeeeee;

      --button-background: #202123;
      --button-text: #ffffff;

      --accent-color: #12866c;
      --drag-background: #dff5ed;
    }


    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--page-background);
      color: var(--primary-text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: var(--sidebar-background);
      border-right: 1px solid var(--subtle-border);
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .new-chat {
      background: var(--panel-background);
      color: var(--primary-text);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .new-chat:hover {
      background: var(--panel-hover);
    }

    .chat-list {
      overflow-y: auto;
      flex: 1;
    }

    .chat-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--secondary-text);
      font-size: 14px;
      margin-bottom: 4px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-item:hover {
      background: var(--panel-hover);
    }

    .chat-item.active {
      background: var(--panel-active);
      color: var(--primary-text);
    }

    .chat-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .delete-chat {
      background: transparent;
      color: var(--muted-text);
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .delete-chat:hover {
      background: var(--panel-background);
      color: var(--primary-text);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      height: 56px;
      border-bottom: 1px solid var(--subtle-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: bold;
      background: var(--page-background);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      line-height: 1.6;
    }

    .avatar {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 11px;
      font-weight: bold;
      color: var(--primary-text);
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .user .avatar {
      background: #4a77ff;
    }

    .assistant .avatar {
      background: #19a37f;
    }

    .content {
      background: transparent;
      padding-top: 3px;
      width: 100%;
      overflow-wrap: break-word;
    }

    .content p {
      margin: 0 0 12px;
    }

    .content code {
      background: var(--panel-background);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: Consolas, monospace;
    }

    .content pre {
      background: var(--code-background);
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid #666;
      margin: 10px 0;
      padding-left: 12px;
      color: var(--secondary-text);
    }

    .content ul,
    .content ol {
      padding-left: 24px;
    }

    .input-area {
      padding: 18px 24px 24px;
      border-top: 1px solid var(--subtle-border);
      background: var(--page-background);
    }

    .input-wrapper {
      max-width: 850px;
      margin: 0 auto;
      background: var(--panel-background);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      gap: 10px;
    }

    .input-wrapper.drag-over {
      border-color: var(--accent-color);
      background: var(--drag-background);
    }

    .pending-files {
      max-width: 850px;
      margin: 8px auto 0;
      color: var(--muted-text);
      font-size: 13px;
    }

    .pending-file {
      background: var(--panel-background);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 10px;
      margin-top: 6px;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--primary-text);
      font-size: 15px;
      max-height: 180px;
      min-height: 24px;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }


    textarea::placeholder {
      color: var(--muted-text);
    }

    button.send {
      background: var(--button-background);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    button.send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.upload {
      background: var(--panel-background);
      color: var(--primary-text);
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-label {
      color: var(--secondary-text);
      font-size: 13px;
      font-weight: normal;
    }

    .model-select {
      min-width: 180px;
      max-width: 300px;
      background: var(--panel-background);
      color: var(--primary-text);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .model-select:hover {
      background: var(--panel-hover);
    }

    .model-select:focus {
      border-color: var(--accent-color);
    }

    .model-select:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    button.upload:hover {
      background: var(--panel-hover);
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted-text);
      font-size: 24px;
      text-align: center;
    }

    .header {
      justify-content: space-between;
      gap: 12px;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: normal;
      color: var(--secondary-text);
    }


    .theme-button {
      background: var(--panel-background);
      color: var(--primary-text);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .theme-button:hover {
      background: var(--panel-hover);
    }

    .logout-button {
      background: var(--panel-background);
      color: var(--primary-text);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .logout-button:hover {
      background: var(--panel-hover);
    }

    @media (max-width: 700px) {

      .sidebar {
        display: none;
      }

      .messages {
        padding: 16px;
      }
    }

  </style>
</head>

<body>

  <aside class="sidebar">

    <button
      class="new-chat"
      onclick="createNewChat()"
    >
      + New Chat
    </button>

    <div
      id="chatList"
      class="chat-list"
    ></div>

  </aside>

  <main class="main">

    <div class="header">
      <div class="header-left">
        <span>Local MIND</span>

        <label for="modelSelect" class="model-label">
          Model:
        </label>

        <select id="modelSelect" class="model-select">
          <option value="">Loading models...</option>
        </select>
      </div>

      <div class="user-menu">
        <span id="currentUsername"></span>

        <button
          id="themeButton"
          class="theme-button"
          onclick="toggleTheme()"
          title="Switch color theme"
        >
          Light mode
        </button>

        <button
          class="logout-button"
          onclick="logout()"
        >
          Log out
        </button>
      </div>
    </div>

    <div
      id="messages"
      class="messages"
    >
      <div class="empty-state">
        How can I help you?
      </div>
    </div>

    <div class="input-area">

      <div id="dropZone" class="input-wrapper">

        <input
          type="file"
          id="fileInput"
          style="display: none;"
          accept=".txt,.md,.cpp,.h,.py,.json"
          multiple
        />

        <div id="pendingFiles" class="pending-files"></div>

        <button
          class="upload"
          onclick="chooseFile()"
          title="Upload file to RAG"
        >
          +
        </button>

        <textarea
          id="userInput"
          placeholder="What is on your MIND today..."
        ></textarea>

        <button
          id="sendButton"
          class="send"
          onclick="handleSend()"
        >
          Send
        </button>

      </div>

    </div>

  </main>

  <script src="./vendor/marked.min.js"></script>

  <script>

    const currentUser =
      JSON.parse(
        localStorage.getItem("current_user")
      );

    if (!currentUser) {
      window.location.href = "./login.html";
    }

    document.getElementById("currentUsername").textContent =
      currentUser.username;


    const themeButton =
      document.getElementById("themeButton");

    function getCurrentTheme() {
      return document.documentElement.dataset.theme || "dark";
    }

    function updateThemeButton() {
      const currentTheme = getCurrentTheme();

      themeButton.textContent =
        currentTheme === "dark"
          ? "Light mode"
          : "Dark mode";
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;

      localStorage.setItem(
        "local_mind_theme",
        theme
      );

      updateThemeButton();
    }

    function toggleTheme() {
      const nextTheme =
        getCurrentTheme() === "dark"
          ? "light"
          : "dark";

      setTheme(nextTheme);
    }

    const systemTheme =
      window.matchMedia("(prefers-color-scheme: light)");

    systemTheme.addEventListener(
      "change",
      function(event) {
        const savedTheme =
          localStorage.getItem("local_mind_theme");

        if (savedTheme) {
          return;
        }

        document.documentElement.dataset.theme =
          event.matches ? "light" : "dark";

        updateThemeButton();
      }
    );

    updateThemeButton();

    function logout() {
      localStorage.removeItem("current_user");
      localStorage.removeItem("user_id");

      window.location.href = "./login.html";
    }

    const API_URL = "/chat";
    const UPLOAD_URL = "/upload";
    const MODELS_URL = "/models";

    const modelSelect =
      document.getElementById("modelSelect");

    async function loadModels() {
      modelSelect.disabled = true;
      modelSelect.innerHTML =
        `<option value="">Loading models...</option>`;

      try {
        const response = await fetch(MODELS_URL);

        if (!response.ok) {
          throw new Error(
            `Server returned ${response.status}`
          );
        }

        const data = await response.json();

        modelSelect.innerHTML = "";

        if (!data.models || data.models.length === 0) {
          modelSelect.innerHTML =
            `<option value="">No models installed</option>`;

          return;
        }

        const savedModel =
          localStorage.getItem("selected_ollama_model");

        data.models.forEach(modelName => {
          const option =
            document.createElement("option");

          option.value = modelName;
          option.textContent = modelName;

          modelSelect.appendChild(option);
        });

        if (
          savedModel &&
          data.models.includes(savedModel)
        ) {
          modelSelect.value = savedModel;
        }
        else if (
          data.default_model &&
          data.models.includes(data.default_model)
        ) {
          modelSelect.value = data.default_model;
        }
        else {
          modelSelect.value = data.models[0];
        }

        localStorage.setItem(
          "selected_ollama_model",
          modelSelect.value
        );

      } catch (error) {
        console.error(
          "Could not load Ollama models:",
          error
        );

        modelSelect.innerHTML =
          `<option value="">Models unavailable</option>`;
      } finally {
        modelSelect.disabled = false;
      }
    }

    modelSelect.addEventListener(
      "change",
      function() {
        localStorage.setItem(
          "selected_ollama_model",
          modelSelect.value
        );
      }
    );

    const fileInput =
      document.getElementById("fileInput");

    const currentUserId = currentUser.user_id;

    if (!currentUserId) {
      window.location.href = "./login.html";
    }

    let chats = [];
    let activeChatId = null;

    const CHATS_URL = "/chats";

    const messagesDiv =
      document.getElementById("messages");

    const chatListDiv =
      document.getElementById("chatList");

    const userInput =
      document.getElementById("userInput");

    const sendButton =
      document.getElementById("sendButton");

    async function saveChat(chat) {
      if (!chat) {
        return;
      }

      try {
        const response = await fetch(
          `${CHATS_URL}/${encodeURIComponent(chat.id)}`,
          {
            method: "PUT",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              user_id: currentUserId,
              chat_id: chat.id,
              title: chat.title,
              messages: chat.messages
            })
          }
        );

        const responseText = await response.text();

        let data = {};

        try {
          data = responseText
            ? JSON.parse(responseText)
            : {};
        } catch {
          throw new Error(
            `Invalid server response (${response.status}): ${responseText}`
          );
        }

        if (!response.ok || !data.success) {
          throw new Error(
            data.error || `Could not save chat (${response.status})`
          );
        }

      } catch (error) {
        console.error(
          "Failed to save chat:",
          error
        );
      }
    }

    async function loadChats() {
      try {
        const response = await fetch(
          `${CHATS_URL}/${encodeURIComponent(currentUserId)}`
        );

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(
            data.error || "Could not load chats"
          );
        }

        chats = data.chats.map(chat => ({
          id: chat.chat_id,
          title: chat.title || "New Chat",
          messages: Array.isArray(chat.messages)
            ? chat.messages
            : []
        }));

        if (chats.length === 0) {
          await createNewChat();
          return;
        }

        activeChatId = chats[0].id;

        renderChatList();
        renderMessages();

      } catch (error) {
        console.error(
          "Failed to load chats:",
          error
        );

        chats = [];
        await createNewChat();
      }
    }
    function generateChatId() {
      if (
        window.crypto &&
        typeof window.crypto.randomUUID === "function"
      ) {
        return window.crypto.randomUUID();
      }

      return (
        Date.now().toString(36) +
        "-" +
        Math.random().toString(36).substring(2, 10)
      );
    }

    async function createNewChat() {
      const chat = {
        id: generateChatId(),
        title: "New Chat",
        messages: []
      };

      chats.unshift(chat);
      activeChatId = chat.id;

      renderChatList();
      renderMessages();

      await saveChat(chat);

      return chat;
    }

    async function handleSend() {

      if (pendingFiles.length > 0) {
        await uploadSelectedFile();
      }

      await sendMessage();
    }

    function getActiveChat() {

      return chats.find(
        chat => chat.id === activeChatId
      );
    }
    function selectChat(id) {
      activeChatId = id;

      renderChatList();
      renderMessages();
    }

    async function deleteChat(id) {
      const shouldDelete =
        confirm("Delete this chat?");

      if (!shouldDelete) {
        return;
      }

      try {
        const response = await fetch(
          `${CHATS_URL}/${encodeURIComponent(id)}`,
          {
            method: "DELETE",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              user_id: currentUserId
            })
          }
        );

        const data = await response.json();

        if (!response.ok || !data.success) {
          throw new Error(
            data.error || "Could not delete chat"
          );
        }

        chats = chats.filter(
          chat => chat.id !== id
        );

        if (activeChatId === id) {
          activeChatId =
            chats.length > 0
              ? chats[0].id
              : null;
        }

        if (chats.length === 0) {
          await createNewChat();
          return;
        }

        renderChatList();
        renderMessages();

      } catch (error) {
        console.error(
          "Failed to delete chat:",
          error
        );

        alert("Could not delete the chat.");
      }
    }

    function renderChatList() {

      chatListDiv.innerHTML = "";

      chats.forEach(chat => {

        const item =
          document.createElement("div");

        item.className =
          "chat-item" +
          (
            chat.id === activeChatId
              ? " active"
              : ""
          );

        item.onclick = () =>
          selectChat(chat.id);

        const title =
          document.createElement("span");

        title.className =
          "chat-title";

        title.textContent =
          chat.title;

        const deleteButton =
          document.createElement("button");

        deleteButton.className =
          "delete-chat";

        deleteButton.textContent = "×";

        deleteButton.title =
          "Delete chat";

        deleteButton.onclick =
          (event) => {

            event.stopPropagation();

            deleteChat(chat.id);
          };

        item.appendChild(title);
        item.appendChild(deleteButton);

        chatListDiv.appendChild(item);
      });
    }

    function renderMessages() {

      const chat =
        getActiveChat();

      messagesDiv.innerHTML = "";

      if (
        !chat ||
        chat.messages.length === 0
      ) {

        messagesDiv.innerHTML =
          `<div class="empty-state">
            How can I help you?
          </div>`;

        return;
      }

      chat.messages.forEach(msg => {

        addMessageToScreen(
          msg.role,
          msg.content,
          false
        );
      });

      scrollToBottom();
    }

    function addMessageToScreen(
      role,
      content,
      shouldScroll = true
    ) {

      const messageDiv =
        document.createElement("div");

      messageDiv.className =
        `message ${role}`;

      const avatar =
        document.createElement("div");

      avatar.className =
        "avatar";

      if (role === "user") {
        avatar.textContent = "You";
      }
      else {
        const img = document.createElement("img");
        img.src = "./images/brain-root.png";
        img.alt = "AI";
        avatar.appendChild(img);
      }

      const contentDiv =
        document.createElement("div");

      contentDiv.className =
        "content";

      if (role === "assistant") {

        contentDiv.innerHTML =
          parseMarkdown(content);
      }
      else {

        contentDiv.textContent =
          content;
      }

      messageDiv.appendChild(avatar);

      messageDiv.appendChild(contentDiv);

      messagesDiv.appendChild(messageDiv);

      if (shouldScroll) {
        scrollToBottom();
      }

      return contentDiv;
    }

    function scrollToBottom() {

      messagesDiv.scrollTop =
        messagesDiv.scrollHeight;
    }

    function autoResizeTextarea() {

      userInput.style.height =
        "auto";

      userInput.style.height =
        userInput.scrollHeight + "px";
    }

    userInput.addEventListener(
      "input",
      autoResizeTextarea
    );

    userInput.addEventListener(
      "keydown",
      function(event) {

        if (
          event.key === "Enter" &&
          !event.shiftKey
        ) {

          event.preventDefault();

          handleSend();
        }
      }
    );

    async function sendMessage() {

      const text =
        userInput.value.trim();

      if (!text) return;

      if (!modelSelect.value) {
        alert("No Ollama model is available.");
        return;
      }

      let chat =
        getActiveChat();

      if (!chat) {
        chat = await createNewChat();
      }
      if (chat.title === "New Chat") {

        chat.title =
          text.slice(0, 32);
      }

      chat.messages.push({
        role: "user",
        content: text
      });

      userInput.value = "";

      autoResizeTextarea();

      await saveChat(chat);

      renderChatList();
      renderMessages();

      sendButton.disabled = true;

      const assistantContent =
        addMessageToScreen(
          "assistant",
          "Thinking..."
        );

      try {

        const response =
          await fetch(API_URL, {

            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              user_id: currentUserId,
              chat_id: chat.id,
              message: text,
              model: modelSelect.value,
              messages: chat.messages
            })
          });

        if (!response.ok) {

          throw new Error(
            `Server error: ${response.status}`
          );
        }

        const data =
          await response.json();

        const reply =
          data.answer ||
          "No response received.";

        chat.messages.push({
          role: "assistant",
          content: reply
        });

        assistantContent.innerHTML =
          parseMarkdown(reply);

        await saveChat(chat);

      } catch (error) {

        const errorMessage =
          `Could not connect to the RAG backend.\n\n${error.message}`;

        assistantContent.textContent =
          errorMessage;

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        await saveChat(chat);
      } finally {

        sendButton.disabled = false;

        scrollToBottom();
      }
    }

    function chooseFile() {
      fileInput.click();
    }

    let pendingFiles = [];

    const pendingFilesDiv =
      document.getElementById("pendingFiles");

    fileInput.addEventListener(
      "change",
      function() {
        addPendingFiles(fileInput.files);
        fileInput.value = "";
      }
    );

    const dropZone =
      document.getElementById("dropZone");

    dropZone.addEventListener(
      "dragover",
      function(event) {
        event.preventDefault();
        dropZone.classList.add("drag-over");
      }
    );

    dropZone.addEventListener(
      "dragleave",
      function() {
        dropZone.classList.remove("drag-over");
      }
    );

    dropZone.addEventListener(
      "drop",
      function(event) {
        event.preventDefault();
        dropZone.classList.remove("drag-over");

        addPendingFiles(event.dataTransfer.files);
      }
    );

    function addPendingFiles(files) {
      for (const file of files) {
        pendingFiles.push(file);
      }

      renderPendingFiles();
    }

    function renderPendingFiles() {
      pendingFilesDiv.innerHTML = "";

      pendingFiles.forEach((file, index) => {
        const item = document.createElement("div");
        item.className = "pending-file";

        const fileName = document.createElement("span");
        fileName.textContent = file.name;

        const removeButton = document.createElement("button");
        removeButton.className = "remove-file";
        removeButton.textContent = "✕";

        removeButton.onclick = () => {
          pendingFiles.splice(index, 1);
          renderPendingFiles();
        };

        item.appendChild(fileName);
        item.appendChild(removeButton);

        pendingFilesDiv.appendChild(item);
      });
    }

    async function uploadSelectedFile() {

      if (!pendingFiles.length) {
        return;
      }

      let chat = getActiveChat();

      if (!chat) {
        chat = await createNewChat();
      }

      addMessageToScreen(
        "user",
        `Uploading ${pendingFiles.length} file(s)...`
      );

      const assistantMessage =
        addMessageToScreen(
          "assistant",
          "Embedding files into RAG database..."
        );

      const results = [];

      try {

        for (const file of pendingFiles) {

          const formData = new FormData();

          formData.append("file", file);
          formData.append("user_id", currentUserId);
          formData.append("chat_id", chat.id);

          const response = await fetch(UPLOAD_URL, {
            method: "POST",
            body: formData
          });

          if (!response.ok) {
            pendingFiles = [];
            renderPendingFiles();
            throw new Error(`Server error: ${response.status}`);
          }

          const data = await response.json();

          if (!data.success) {
            pendingFiles = [];
            renderPendingFiles();
            throw new Error(data.error || "Upload failed");
          }

          results.push(
            `File: ${data.filename}\nChunks Added: ${data.chunks_added}`
          );
        }

        const successMessage =
          `Files embedded successfully.\n\n` +
          results.join("\n\n---\n\n");

        assistantMessage.innerHTML =
          parseMarkdown(successMessage);

        chat.messages.push({
          role: "assistant",
          content: successMessage
        });

        pendingFiles = [];
        renderPendingFiles();
        await saveChat(chat);

      } catch (error) {

        const errorMessage =
          `File upload failed:\n\n${error.message}`;

        assistantMessage.innerHTML =
          parseMarkdown(errorMessage);

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        await saveChat(chat);

      } finally {
        scrollToBottom();
      }
    }

    function parseMarkdown(markdown) {

      return marked.parse(markdown);
    }

    async function initializeApp() {
      await loadModels();
      await loadChats();
    }

    initializeApp();

  </script>

</body>
