<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Chatbot</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #212121;
      color: #ececec;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: #171717;
      border-right: 1px solid #2f2f2f;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .new-chat {
      background: #2f2f2f;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .new-chat:hover {
      background: #3a3a3a;
    }

    .chat-list {
      overflow-y: auto;
      flex: 1;
    }

    .chat-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      color: #d0d0d0;
      font-size: 14px;
      margin-bottom: 4px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-item:hover {
      background: #2a2a2a;
    }

    .chat-item.active {
      background: #343434;
      color: white;
    }

    .chat-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .delete-chat {
      background: transparent;
      color: #aaa;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .delete-chat:hover {
      background: #444;
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      height: 56px;
      border-bottom: 1px solid #2f2f2f;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: bold;
      background: #212121;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      line-height: 1.6;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .user .avatar {
      background: #4a77ff;
    }

    .assistant .avatar {
      background: #19a37f;
    }

    .content {
      background: transparent;
      padding-top: 3px;
      width: 100%;
      overflow-wrap: break-word;
    }

    .content p {
      margin: 0 0 12px;
    }

    .content code {
      background: #2f2f2f;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: Consolas, monospace;
    }

    .content pre {
      background: #111;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #333;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid #666;
      margin: 10px 0;
      padding-left: 12px;
      color: #cfcfcf;
    }

    .content ul,
    .content ol {
      padding-left: 24px;
    }

    .input-area {
      padding: 18px 24px 24px;
      border-top: 1px solid #2f2f2f;
      background: #212121;
    }

    .input-wrapper {
      max-width: 850px;
      margin: 0 auto;
      background: #2f2f2f;
      border: 1px solid #444;
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      gap: 10px;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 15px;
      max-height: 180px;
      min-height: 24px;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }

    button.send {
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    button.send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.upload {
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    button.upload:hover {
      background: #555;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 24px;
      text-align: center;
    }

    @media (max-width: 700px) {

      .sidebar {
        display: none;
      }

      .messages {
        padding: 16px;
      }
    }

  </style>
</head>

<body>

  <aside class="sidebar">

    <button
      class="new-chat"
      onclick="createNewChat()"
    >
      + New Chat
    </button>

    <div
      id="chatList"
      class="chat-list"
    ></div>

  </aside>

  <main class="main">

    <div class="header">
      Offline Chatbot
    </div>

    <div
      id="messages"
      class="messages"
    >
      <div class="empty-state">
        How can I help you?
      </div>
    </div>

    <div class="input-area">

      <div class="input-wrapper">

        <input
          type="file"
          id="fileInput"
          style="display: none;"
          accept=".txt,.md,.cpp,.h,.py,.json"
        />

        <button
          class="upload"
          onclick="chooseFile()"
          title="Upload file to RAG"
        >
          +
        </button>

        <textarea
          id="userInput"
          placeholder="Message offline chatbot..."
        ></textarea>

        <button
          id="sendButton"
          class="send"
          onclick="sendMessage()"
        >
          Send
        </button>

      </div>

    </div>

  </main>

  <script>

    const API_URL =
      "http://127.0.0.1:3000/chat";

    const UPLOAD_URL =
      "http://127.0.0.1:3000/upload";

    const fileInput =
      document.getElementById("fileInput");

    let chats =
      JSON.parse(
        localStorage.getItem("offline_chats")
      ) || [];

    let activeChatId =
      localStorage.getItem(
        "active_chat_id"
      );

    const messagesDiv =
      document.getElementById("messages");

    const chatListDiv =
      document.getElementById("chatList");

    const userInput =
      document.getElementById("userInput");

    const sendButton =
      document.getElementById("sendButton");

    function saveChats() {

      localStorage.setItem(
        "offline_chats",
        JSON.stringify(chats)
      );

      localStorage.setItem(
        "active_chat_id",
        activeChatId
      );
    }

    function createNewChat() {

      const chat = {
        id: crypto.randomUUID(),
        title: "New Chat",
        messages: []
      };

      chats.unshift(chat);

      activeChatId = chat.id;

      saveChats();

      renderChatList();
      renderMessages();
    }

    function getActiveChat() {

      return chats.find(
        chat => chat.id === activeChatId
      );
    }

    function selectChat(id) {

      activeChatId = id;

      saveChats();

      renderChatList();
      renderMessages();
    }

    function deleteChat(id) {

      const shouldDelete =
        confirm("Delete this chat?");

      if (!shouldDelete) {
        return;
      }

      chats = chats.filter(
        chat => chat.id !== id
      );

      if (activeChatId === id) {

        if (chats.length > 0) {
          activeChatId = chats[0].id;
        }
        else {

          activeChatId = null;

          createNewChat();

          return;
        }
      }

      saveChats();

      renderChatList();
      renderMessages();
    }

    function renderChatList() {

      chatListDiv.innerHTML = "";

      chats.forEach(chat => {

        const item =
          document.createElement("div");

        item.className =
          "chat-item" +
          (
            chat.id === activeChatId
              ? " active"
              : ""
          );

        item.onclick = () =>
          selectChat(chat.id);

        const title =
          document.createElement("span");

        title.className =
          "chat-title";

        title.textContent =
          chat.title;

        const deleteButton =
          document.createElement("button");

        deleteButton.className =
          "delete-chat";

        deleteButton.textContent = "×";

        deleteButton.title =
          "Delete chat";

        deleteButton.onclick =
          (event) => {

            event.stopPropagation();

            deleteChat(chat.id);
          };

        item.appendChild(title);
        item.appendChild(deleteButton);

        chatListDiv.appendChild(item);
      });
    }

    function renderMessages() {

      const chat =
        getActiveChat();

      messagesDiv.innerHTML = "";

      if (
        !chat ||
        chat.messages.length === 0
      ) {

        messagesDiv.innerHTML =
          `<div class="empty-state">
            How can I help you?
          </div>`;

        return;
      }

      chat.messages.forEach(msg => {

        addMessageToScreen(
          msg.role,
          msg.content,
          false
        );
      });

      scrollToBottom();
    }

    function addMessageToScreen(
      role,
      content,
      shouldScroll = true
    ) {

      const messageDiv =
        document.createElement("div");

      messageDiv.className =
        `message ${role}`;

      const avatar =
        document.createElement("div");

      avatar.className =
        "avatar";

      avatar.textContent =
        role === "user"
          ? "You"
          : "AI";

      const contentDiv =
        document.createElement("div");

      contentDiv.className =
        "content";

      if (role === "assistant") {

        contentDiv.innerHTML =
          parseMarkdown(content);
      }
      else {

        contentDiv.textContent =
          content;
      }

      messageDiv.appendChild(avatar);

      messageDiv.appendChild(contentDiv);

      messagesDiv.appendChild(messageDiv);

      if (shouldScroll) {
        scrollToBottom();
      }

      return contentDiv;
    }

    function scrollToBottom() {

      messagesDiv.scrollTop =
        messagesDiv.scrollHeight;
    }

    function autoResizeTextarea() {

      userInput.style.height =
        "auto";

      userInput.style.height =
        userInput.scrollHeight + "px";
    }

    userInput.addEventListener(
      "input",
      autoResizeTextarea
    );

    userInput.addEventListener(
      "keydown",
      function(event) {

        if (
          event.key === "Enter" &&
          !event.shiftKey
        ) {

          event.preventDefault();

          sendMessage();
        }
      }
    );

    async function sendMessage() {

      const text =
        userInput.value.trim();

      if (!text) return;

      let chat =
        getActiveChat();

      if (!chat) {

        createNewChat();

        chat =
          getActiveChat();
      }

      if (chat.title === "New Chat") {

        chat.title =
          text.slice(0, 32);
      }

      chat.messages.push({
        role: "user",
        content: text
      });

      userInput.value = "";

      autoResizeTextarea();

      saveChats();

      renderChatList();
      renderMessages();

      sendButton.disabled = true;

      const assistantContent =
        addMessageToScreen(
          "assistant",
          "Thinking..."
        );

      try {

        const response =
          await fetch(API_URL, {

            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              chat_id: chat.id,
              message: text,
              messages: chat.messages
            })
          });

        if (!response.ok) {

          throw new Error(
            `Server error: ${response.status}`
          );
        }

        const data =
          await response.json();

        const reply =
          data.answer ||
          "No response received.";

        chat.messages.push({
          role: "assistant",
          content: reply
        });

        assistantContent.innerHTML =
          parseMarkdown(reply);

        saveChats();

      } catch (error) {

        const errorMessage =
          "Could not connect to the RAG backend.";

        assistantContent.textContent =
          errorMessage;

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        saveChats();

      } finally {

        sendButton.disabled = false;

        scrollToBottom();
      }
    }

    function chooseFile() {
      fileInput.click();
    }

    fileInput.addEventListener(
      "change",
      uploadSelectedFile
    );

    async function uploadSelectedFile() {

      if (!fileInput.files.length) {
        return;
      }

      const file =
        fileInput.files[0];

      let chat =
        getActiveChat();

      if (!chat) {

        createNewChat();

        chat =
          getActiveChat();
      }

      addMessageToScreen(
        "user",
        `Uploading file: ${file.name}`
      );

      const assistantMessage =
        addMessageToScreen(
          "assistant",
          "Embedding file into RAG database..."
        );

      const formData =
        new FormData();

      formData.append(
        "file",
        file
      );

      formData.append(
        "chat_id",
        chat.id
      );

      try {

        const response =
          await fetch(UPLOAD_URL, {
            method: "POST",
            body: formData
          });

        if (!response.ok) {

          throw new Error(
            `Server error: ${response.status}`
          );
        }

        const data =
          await response.json();

        if (!data.success) {

          throw new Error(
            data.error ||
            "Upload failed"
          );
        }

        const successMessage =
          `File embedded successfully.\n\n` +
          `File: ${data.filename}\n` +
          `Chunks Added: ${data.chunks_added}`;

        assistantMessage.innerHTML =
          parseMarkdown(successMessage);

        chat.messages.push({
          role: "assistant",
          content: successMessage
        });

        saveChats();

      } catch (error) {

        const errorMessage =
          `File upload failed:\n\n${error.message}`;

        assistantMessage.innerHTML =
          parseMarkdown(errorMessage);

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        saveChats();

      } finally {

        fileInput.value = "";

        scrollToBottom();
      }
    }

    function escapeHtml(text) {

      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseMarkdown(markdown) {

      let html =
        escapeHtml(markdown);

      html = html.replace(
        /```([\s\S]*?)```/g,
        function(match, code) {

          return `
            <pre><code>
              ${code.trim()}
            </code></pre>
          `;
        }
      );

      html = html.replace(
        /`([^`]+)`/g,
        "<code>$1</code>"
      );

      html = html.replace(
        /^### (.*$)/gim,
        "<h3>$1</h3>"
      );

      html = html.replace(
        /^## (.*$)/gim,
        "<h2>$1</h2>"
      );

      html = html.replace(
        /^# (.*$)/gim,
        "<h1>$1</h1>"
      );

      html = html.replace(
        /\*\*(.*?)\*\*/g,
        "<strong>$1</strong>"
      );

      html = html.replace(
        /\*(.*?)\*/g,
        "<em>$1</em>"
      );

      html = html.replace(
        /^> (.*$)/gim,
        "<blockquote>$1</blockquote>"
      );

      html = html.replace(
        /^\s*[-*] (.*)$/gim,
        "<ul><li>$1</li></ul>"
      );

      html = html.replace(
        /<\/ul>\s*<ul>/g,
        ""
      );

      html = html.replace(
        /^\s*\d+\. (.*)$/gim,
        "<ol><li>$1</li></ol>"
      );

      html = html.replace(
        /<\/ol>\s*<ol>/g,
        ""
      );

      html = html.replace(
        /\n\n/g,
        "</p><p>"
      );

      html = html.replace(
        /\n/g,
        "<br>"
      );

      return `<p>${html}</p>`;
    }

    if (chats.length === 0) {

      createNewChat();

    } else {

      if (
        !activeChatId ||
        !getActiveChat()
      ) {

        activeChatId =
          chats[0].id;
      }

      renderChatList();
      renderMessages();
    }

  </script>

</body>
</html>
