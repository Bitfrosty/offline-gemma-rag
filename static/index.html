<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local MIND</title>
  
  <link
    rel="icon"
    href="./images/brain-root-light.png"
    media="(prefers-color-scheme: light)"
  >

  <link
    rel="icon"
    href="./images/brain-root-dark.png"
    media="(prefers-color-scheme: dark)"
  >

  <script>
    const loggedInUser = JSON.parse(
      localStorage.getItem("current_user")
    );

    if (!loggedInUser || !loggedInUser.username) {
      window.location.href = "./login.html";
    }
  </script>

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #212121;
      color: #ececec;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      background: #171717;
      border-right: 1px solid #2f2f2f;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .new-chat {
      background: #2f2f2f;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      cursor: pointer;
      text-align: left;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .new-chat:hover {
      background: #3a3a3a;
    }

    .chat-list {
      overflow-y: auto;
      flex: 1;
    }

    .chat-item {
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      color: #d0d0d0;
      font-size: 14px;
      margin-bottom: 4px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .chat-item:hover {
      background: #2a2a2a;
    }

    .chat-item.active {
      background: #343434;
      color: white;
    }

    .chat-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .delete-chat {
      background: transparent;
      color: #aaa;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .delete-chat:hover {
      background: #444;
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      height: 56px;
      border-bottom: 1px solid #2f2f2f;
      display: flex;
      align-items: center;
      padding: 0 20px;
      font-weight: bold;
      background: #212121;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .message {
      max-width: 850px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 14px;
      line-height: 1.6;
    }

    .avatar {
      width: 36px;
      height: 36px;
      min-width: 36px;
      border-radius: 50%;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 11px;
      font-weight: bold;
      color: white;
      flex-shrink: 0;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .user .avatar {
      background: #4a77ff;
    }

    .assistant .avatar {
      background: #19a37f;
    }

    .content {
      background: transparent;
      padding-top: 3px;
      width: 100%;
      overflow-wrap: break-word;
    }

    .content p {
      margin: 0 0 12px;
    }

    .content code {
      background: #2f2f2f;
      padding: 2px 5px;
      border-radius: 4px;
      font-family: Consolas, monospace;
    }

    .content pre {
      background: #111;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid #333;
    }

    .content pre code {
      background: none;
      padding: 0;
    }

    .content blockquote {
      border-left: 4px solid #666;
      margin: 10px 0;
      padding-left: 12px;
      color: #cfcfcf;
    }

    .content ul,
    .content ol {
      padding-left: 24px;
    }

    .input-area {
      padding: 18px 24px 24px;
      border-top: 1px solid #2f2f2f;
      background: #212121;
    }

    .input-wrapper {
      max-width: 850px;
      margin: 0 auto;
      background: #2f2f2f;
      border: 1px solid #444;
      border-radius: 14px;
      display: flex;
      align-items: flex-end;
      padding: 10px;
      gap: 10px;
    }

    .input-wrapper.drag-over {
      border-color: #19a37f;
      background: #263f37;
    }

    .pending-files {
      max-width: 850px;
      margin: 8px auto 0;
      color: #aaa;
      font-size: 13px;
    }

    .pending-file {
      background: #2f2f2f;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 6px 10px;
      margin-top: 6px;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: transparent;
      color: white;
      font-size: 15px;
      max-height: 180px;
      min-height: 24px;
      line-height: 1.5;
      font-family: Arial, sans-serif;
    }

    button.send {
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: bold;
    }

    button.send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button.upload {
      background: #444;
      color: white;
      border: none;
      border-radius: 8px;
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    button.upload:hover {
      background: #555;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 24px;
      text-align: center;
    }

    .header {
      justify-content: space-between;
      gap: 12px;
    }

    .user-menu {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: normal;
      color: #cfcfcf;
    }

    .logout-button {
      background: #2f2f2f;
      color: white;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .logout-button:hover {
      background: #3a3a3a;
    }

    @media (max-width: 700px) {

      .sidebar {
        display: none;
      }

      .messages {
        padding: 16px;
      }
    }

  </style>
</head>

<body>

  <aside class="sidebar">

    <button
      class="new-chat"
      onclick="createNewChat()"
    >
      + New Chat
    </button>

    <div
      id="chatList"
      class="chat-list"
    ></div>

  </aside>

  <main class="main">

    <div class="header">
      <span>Local MIND</span>

      <div class="user-menu">
        <span id="currentUsername"></span>
        <button
          class="logout-button"
          onclick="logout()"
        >
          Log out
        </button>
      </div>
    </div>

    <div
      id="messages"
      class="messages"
    >
      <div class="empty-state">
        How can I help you?
      </div>
    </div>

    <div class="input-area">

      <div id="dropZone" class="input-wrapper">

        <input
          type="file"
          id="fileInput"
          style="display: none;"
          accept=".txt,.md,.cpp,.h,.py,.json"
          multiple
        />

        <div id="pendingFiles" class="pending-files"></div>

        <button
          class="upload"
          onclick="chooseFile()"
          title="Upload file to RAG"
        >
          +
        </button>

        <textarea
          id="userInput"
          placeholder="What is on your MIND today..."
        ></textarea>

        <button
          id="sendButton"
          class="send"
          onclick="handleSend()"
        >
          Send
        </button>

      </div>

    </div>

  </main>

  <script src="./vendor/marked.min.js"></script>

  <script>

    const currentUser =
      JSON.parse(
        localStorage.getItem("current_user")
      );

    if (!currentUser) {
      window.location.href = "./login.html";
    }

    document.getElementById("currentUsername").textContent =
      currentUser.username;

    function logout() {

      localStorage.removeItem("current_user");

      window.location.href = "./login.html";
    }

    const CHAT_STORAGE_KEY =
      `offline_chats_${currentUser.username}`;

    const ACTIVE_CHAT_STORAGE_KEY =
      `active_chat_id_${currentUser.username}`;

    const API_URL = "/chat";
    const UPLOAD_URL = "/upload";

    const fileInput =
      document.getElementById("fileInput");

    const currentUserId = localStorage.getItem("user_id");

    if (!currentUserId) {
      window.location.href = "./login.html";
    }

    let chats =
      JSON.parse(
        localStorage.getItem(`offline_chats_${currentUserId}`)
      ) || [];

    let activeChatId =
      localStorage.getItem(
        ACTIVE_CHAT_STORAGE_KEY
      );

    const messagesDiv =
      document.getElementById("messages");

    const chatListDiv =
      document.getElementById("chatList");

    const userInput =
      document.getElementById("userInput");

    const sendButton =
      document.getElementById("sendButton");

    function saveChats() {

      localStorage.setItem(
        `offline_chats_${currentUserId}`,
        JSON.stringify(chats)
      );

      localStorage.setItem(
        `active_chat_id_${currentUserId}`,
        activeChatId
      );
    }
    function createNewChat() {

      const chat = {
        id: Date.now().toString() + "-" + Math.random().toString(36).slice(2),
        title: "New Chat",
        messages: []
      };

      chats.unshift(chat);

      activeChatId = chat.id;

      saveChats();

      renderChatList();
      renderMessages();
    }

    async function handleSend() {

      if (pendingFiles.length > 0) {
        await uploadSelectedFile();
      }

      await sendMessage();
    }

    function getActiveChat() {

      return chats.find(
        chat => chat.id === activeChatId
      );
    }

    function selectChat(id) {

      activeChatId = id;

      saveChats();

      renderChatList();
      renderMessages();
    }

    function deleteChat(id) {

      const shouldDelete =
        confirm("Delete this chat?");

      if (!shouldDelete) {
        return;
      }

      chats = chats.filter(
        chat => chat.id !== id
      );

      if (activeChatId === id) {

        if (chats.length > 0) {
          activeChatId = chats[0].id;
        }
        else {

          activeChatId = null;

          createNewChat();

          return;
        }
      }

      saveChats();

      renderChatList();
      renderMessages();
    }

    function renderChatList() {

      chatListDiv.innerHTML = "";

      chats.forEach(chat => {

        const item =
          document.createElement("div");

        item.className =
          "chat-item" +
          (
            chat.id === activeChatId
              ? " active"
              : ""
          );

        item.onclick = () =>
          selectChat(chat.id);

        const title =
          document.createElement("span");

        title.className =
          "chat-title";

        title.textContent =
          chat.title;

        const deleteButton =
          document.createElement("button");

        deleteButton.className =
          "delete-chat";

        deleteButton.textContent = "×";

        deleteButton.title =
          "Delete chat";

        deleteButton.onclick =
          (event) => {

            event.stopPropagation();

            deleteChat(chat.id);
          };

        item.appendChild(title);
        item.appendChild(deleteButton);

        chatListDiv.appendChild(item);
      });
    }

    function renderMessages() {

      const chat =
        getActiveChat();

      messagesDiv.innerHTML = "";

      if (
        !chat ||
        chat.messages.length === 0
      ) {

        messagesDiv.innerHTML =
          `<div class="empty-state">
            How can I help you?
          </div>`;

        return;
      }

      chat.messages.forEach(msg => {

        addMessageToScreen(
          msg.role,
          msg.content,
          false
        );
      });

      scrollToBottom();
    }

    function addMessageToScreen(
      role,
      content,
      shouldScroll = true
    ) {

      const messageDiv =
        document.createElement("div");

      messageDiv.className =
        `message ${role}`;

      const avatar =
        document.createElement("div");

      avatar.className =
        "avatar";

      if (role === "user") {
        avatar.textContent = "You";
      }
      else {
        const img = document.createElement("img");
        img.src = "./images/brain-root.png";
        img.alt = "AI";
        avatar.appendChild(img);
      }

      const contentDiv =
        document.createElement("div");

      contentDiv.className =
        "content";

      if (role === "assistant") {

        contentDiv.innerHTML =
          parseMarkdown(content);
      }
      else {

        contentDiv.textContent =
          content;
      }

      messageDiv.appendChild(avatar);

      messageDiv.appendChild(contentDiv);

      messagesDiv.appendChild(messageDiv);

      if (shouldScroll) {
        scrollToBottom();
      }

      return contentDiv;
    }

    function scrollToBottom() {

      messagesDiv.scrollTop =
        messagesDiv.scrollHeight;
    }

    function autoResizeTextarea() {

      userInput.style.height =
        "auto";

      userInput.style.height =
        userInput.scrollHeight + "px";
    }

    userInput.addEventListener(
      "input",
      autoResizeTextarea
    );

    userInput.addEventListener(
      "keydown",
      function(event) {

        if (
          event.key === "Enter" &&
          !event.shiftKey
        ) {

          event.preventDefault();

          sendMessage();
        }
      }
    );

    async function sendMessage() {

      const text =
        userInput.value.trim();

      if (!text) return;

      let chat =
        getActiveChat();

      if (!chat) {

        createNewChat();

        chat =
          getActiveChat();
      }

      if (chat.title === "New Chat") {

        chat.title =
          text.slice(0, 32);
      }

      chat.messages.push({
        role: "user",
        content: text
      });

      userInput.value = "";

      autoResizeTextarea();

      saveChats();

      renderChatList();
      renderMessages();

      sendButton.disabled = true;

      const assistantContent =
        addMessageToScreen(
          "assistant",
          "Thinking..."
        );

      try {

        const response =
          await fetch(API_URL, {

            method: "POST",

            headers: {
              "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
              user_id: localStorage.getItem("user_id"),
              chat_id: chat.id,
              message: text,
              messages: chat.messages
            })
          });

        if (!response.ok) {

          throw new Error(
            `Server error: ${response.status}`
          );
        }

        const data =
          await response.json();

        const reply =
          data.answer ||
          "No response received.";

        chat.messages.push({
          role: "assistant",
          content: reply
        });

        assistantContent.innerHTML =
          parseMarkdown(reply);

        saveChats();

      } catch (error) {

        const errorMessage =
          `Could not connect to the RAG backend.\n\n${error.message}`;

        assistantContent.textContent =
          errorMessage;

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        saveChats();
      } finally {

        sendButton.disabled = false;

        scrollToBottom();
      }
    }

    function chooseFile() {
      fileInput.click();
    }

    let pendingFiles = [];

    const pendingFilesDiv =
      document.getElementById("pendingFiles");

    fileInput.addEventListener(
      "change",
      function() {
        addPendingFiles(fileInput.files);
        fileInput.value = "";
      }
    );

    const dropZone =
      document.getElementById("dropZone");

    dropZone.addEventListener(
      "dragover",
      function(event) {
        event.preventDefault();
        dropZone.classList.add("drag-over");
      }
    );

    dropZone.addEventListener(
      "dragleave",
      function() {
        dropZone.classList.remove("drag-over");
      }
    );

    dropZone.addEventListener(
      "drop",
      function(event) {
        event.preventDefault();
        dropZone.classList.remove("drag-over");

        addPendingFiles(event.dataTransfer.files);
      }
    );

    function addPendingFiles(files) {
      for (const file of files) {
        pendingFiles.push(file);
      }

      renderPendingFiles();
    }

    function renderPendingFiles() {
      pendingFilesDiv.innerHTML = "";

      pendingFiles.forEach((file, index) => {
        const item = document.createElement("div");
        item.className = "pending-file";

        const fileName = document.createElement("span");
        fileName.textContent = file.name;

        const removeButton = document.createElement("button");
        removeButton.className = "remove-file";
        removeButton.textContent = "✕";

        removeButton.onclick = () => {
          pendingFiles.splice(index, 1);
          renderPendingFiles();
        };

        item.appendChild(fileName);
        item.appendChild(removeButton);

        pendingFilesDiv.appendChild(item);
      });
    }

    async function uploadSelectedFile() {

      if (!pendingFiles.length) {
        return;
      }

      let chat = getActiveChat();

      if (!chat) {
        createNewChat();
        chat = getActiveChat();
      }

      addMessageToScreen(
        "user",
        `Uploading ${pendingFiles.length} file(s)...`
      );

      const assistantMessage =
        addMessageToScreen(
          "assistant",
          "Embedding files into RAG database..."
        );

      const results = [];

      try {

        for (const file of pendingFiles) {

          const formData = new FormData();

          formData.append("file", file);
          formData.append("user_id", localStorage.getItem("user_id"));
          formData.append("chat_id", chat.id);

          const response = await fetch(UPLOAD_URL, {
            method: "POST",
            body: formData
          });

          if (!response.ok) {
            pendingFiles = [];
            renderPendingFiles();
            throw new Error(`Server error: ${response.status}`);
          }

          const data = await response.json();

          if (!data.success) {
            pendingFiles = [];
            renderPendingFiles();
            throw new Error(data.error || "Upload failed");
          }

          results.push(
            `File: ${data.filename}\nChunks Added: ${data.chunks_added}`
          );
        }

        const successMessage =
          `Files embedded successfully.\n\n` +
          results.join("\n\n---\n\n");

        assistantMessage.innerHTML =
          parseMarkdown(successMessage);

        chat.messages.push({
          role: "assistant",
          content: successMessage
        });

        pendingFiles = [];
        renderPendingFiles();
        saveChats();

      } catch (error) {

        const errorMessage =
          `File upload failed:\n\n${error.message}`;

        assistantMessage.innerHTML =
          parseMarkdown(errorMessage);

        chat.messages.push({
          role: "assistant",
          content: errorMessage
        });

        saveChats();

      } finally {
        scrollToBottom();
      }
    }

    function parseMarkdown(markdown) {

      return marked.parse(markdown);
    }

    if (chats.length === 0) {

      createNewChat();

    } else {

      if (
        !activeChatId ||
        !getActiveChat()
      ) {

        activeChatId =
          chats[0].id;
      }

      renderChatList();
      renderMessages();
    }

  </script>

</body>
</html>
